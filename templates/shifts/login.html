{% extends "base.html" %}

{% block content %}
<h2>Вход</h2>
<p class="muted">Те же логины и пароли, что в Streamlit (admin и зарегистрированные пользователи).</p>
{% if error %}
<p style="color:#ff6b6b;">{{ error }}</p>
{% endif %}
<form method="post" action="">
  {% csrf_token %}
  <input type="hidden" name="next" value="{{ next_url }}">
  <p><label>Логин<br><input name="username" autocomplete="username" required></label></p>
  <p><label>Пароль<br><input name="password" type="password" autocomplete="current-password" required></label></p>
  <p><button class="btn" type="submit">Войти</button></p>
</form>
<p class="muted">Нет аккаунта? <a href="{% url 'register' %}">Регистрация</a></p>
{% endblock %}
