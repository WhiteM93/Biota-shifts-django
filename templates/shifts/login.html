{% extends "base.html" %}

{% block content %}
<section class="auth-card">
  <p class="auth-title">Вход</p>
  <p class="muted">Введите логин и пароль от вашей учетной записи.</p>
  {% if error %}
  <p style="color:#ff9f9f;">{{ error }}</p>
  {% endif %}
  <form method="post" action="">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next_url }}">
    <p class="auth-row"><label>Логин<br><input name="username" autocomplete="username" required autofocus></label></p>
    <p class="auth-row"><label>Пароль<br><input name="password" type="password" autocomplete="current-password" required></label></p>
    <p class="auth-row">
      <label class="remember-row"><input type="checkbox" name="remember_me" value="1" {% if remember_me %}checked{% endif %}> Запомнить меня</label>
    </p>
    <div class="auth-actions">
      <button class="btn" type="submit">Войти</button>
    </div>
  </form>
  <p class="auth-help muted">Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
</section>
{% endblock %}
