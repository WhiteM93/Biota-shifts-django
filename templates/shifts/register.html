{% extends "base.html" %}

{% block content %}
<section class="auth-card">
  <p class="auth-title">Регистрация</p>
  <p class="muted">Создайте логин и пароль (латиница/цифры/_, пароль от 8 символов).</p>
  {% if error %}
  <p style="color:#ff9f9f;">{{ error }}</p>
  {% endif %}
  <form method="post" action="">
    {% csrf_token %}
    <p class="auth-row"><label>Логин<br><input name="username" autocomplete="username" required minlength="3" maxlength="32" autofocus></label></p>
    <p class="auth-row"><label>Пароль<br><input name="password" type="password" autocomplete="new-password" required minlength="8"></label></p>
    <p class="auth-row"><label>Пароль еще раз<br><input name="password2" type="password" autocomplete="new-password" required minlength="8"></label></p>
    <div class="auth-actions">
      <button class="btn" type="submit">Зарегистрироваться</button>
    </div>
  </form>
  <p class="auth-help muted">Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
</section>
{% endblock %}
