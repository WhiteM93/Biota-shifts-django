{% extends "base.html" %}

{% block content %}
<h2>Регистрация</h2>
<p class="muted">Создайте логин и пароль для доступа (те же правила, что в Streamlit: латиница/цифры/_, пароль не короче 8 символов).</p>
{% if error %}
<p style="color:#ff6b6b;">{{ error }}</p>
{% endif %}
<form method="post" action="">
  {% csrf_token %}
  <p><label>Логин<br><input name="username" autocomplete="username" required minlength="3" maxlength="32"></label></p>
  <p><label>Пароль<br><input name="password" type="password" autocomplete="new-password" required minlength="8"></label></p>
  <p><label>Пароль ещё раз<br><input name="password2" type="password" autocomplete="new-password" required minlength="8"></label></p>
  <p><button class="btn" type="submit">Зарегистрироваться</button></p>
</form>
<p class="muted">Уже есть аккаунт? <a href="{% url 'login' %}">Вход</a></p>
{% endblock %}
